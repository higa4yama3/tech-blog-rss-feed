name: Generate feeds and site

on:
  push:
    branches: [ main ]
  schedule:
    # 平日JST 8-24時（UTC前日23時〜当日15時）の1時間おき
    - cron: 1 23,0-15 * * 1-5
    # 休日JST 8-24時（UTC前日23時〜当日15時）の2時間おき
    - cron: 1 23,1,3,5,7,9,11,13,15 * * 0,6
  workflow_dispatch:

jobs:
  generate-feed:
    name: Generate Feed
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
    - uses: actions/setup-node@v6
      with:
        node-version-file: .tool-versions
        cache: npm
    - run: npm ci
    - uses: ./.github/actions/restore-feed-cache
    - run: npm run feed-generate
    - run: npm run site-prepare
    - run: npm run site-build
    - uses: ./.github/actions/save-feed-cache
    - uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        # NOTE: 変更履歴が必要な場合は false に変更
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
    - name: Create issue on failure
      if: failure()
      run: |
        gh issue create \
          --title "Feed generation failed - $(date '+%Y-%m-%d')" \
          --body "Feed generation or deployment failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
          --label "bug"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
